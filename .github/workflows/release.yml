name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: verona-vscode/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 9.0.0

      - name: Install VS Code packaging dependency
        run: npm ci
        working-directory: verona-vscode

      - name: Build VS Code extension
        run: npm run package
        working-directory: verona-vscode

      - name: Build JetBrains plugin
        run: ./scripts/build-jetbrains.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: .github/release-notes.md
          files: |
            verona-vscode/dist/*.vsix
            verona-jetbrains/dist/*.jar
            verona-jetbrains/dist/*.zip
          generate_release_notes: true
          preserve_order: true
          overwrite_files: true
